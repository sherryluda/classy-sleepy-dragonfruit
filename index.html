<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/icon.jpg" />
    <title>Sherry's CD player</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/controls/OrbitControls.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/three@0.153.0/examples/js/loaders/RGBELoader.js"></script>


    <script src="style.js" defer></script>
  </head>
  <body>
    <!-- loading 畫面 -->
    <div id="loading">
      <img
        id="loading-img"
        src="./assets/icon.png"
        alt="Loading..."
      />
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>
    


    <!-- 浮動文字 -->

    <div class="container">
      <h1 class="neon">
        Hi! I'm Sherry. 
        <br>This room is more than walls
        <br>it’s a symphony of thoughts. 
        <br>Want to understand me? 
        <br>Let the music lead you.
      </h1>
    </div>
  </body>
</html>
